name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"  # nightly at 03:00 UTC

env:
  GO_VERSION: "1.24"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: make build

  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Lint
        run: make lint

  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test
        run: make test

  e2e:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-e2e') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Docker image
        run: make docker-build-local
      - name: Run E2E tests
        run: go test -v -timeout 20m ./tests/e2e/...

  simulation:
    name: "Simulation (nightly)"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build]
    if: ${{ github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'run-sim') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run deterministic simulation
        run: make sim-test

syntax = "proto3";
package zerone.governance_synthesis.v1;

option go_package = "github.com/zerone-chain/zerone/x/governance_synthesis/types";

import "google/api/annotations.proto";
import "zerone/governance_synthesis/v1/types.proto";

// Query is the per-system trust synthesis surface for
// x/governance_synthesis.
//
// docs/TRUTH_SEEKING.md, commitment 11 (trust is queryable): the
// chain's overall governance posture — incident state, pause
// breakers, pending authority injections, privileged-action log,
// cartel allegations, alignment pacing — must be readable as a
// single composite. Trust that requires four queries to read is
// trust that depends on the curator stitching it together; this
// service refuses that posture.
service Query {
  // SystemHealth synthesises the chain's accumulated stress state
  // from incidents, pauses, pending injections, privileged-action
  // log, cartel allegations, and alignment pacing.
  rpc SystemHealth(QuerySystemHealthRequest) returns (QuerySystemHealthResponse) {
    option (google.api.http).get = "/zerone/governance_synthesis/v1/system_health";
  }

  // Frontier synthesises the chain's per-domain sparsity map —
  // domains ranked by how under-mapped they are. Consumers (model
  // trainers, alignment researchers, inquiry askers) see the same
  // frontier the chain itself publishes.
  rpc Frontier(QueryFrontierRequest) returns (QueryFrontierResponse) {
    option (google.api.http).get = "/zerone/governance_synthesis/v1/frontier";
  }
}

message QuerySystemHealthRequest {}

message QuerySystemHealthResponse {
  SystemHealth health = 1;
}

message QueryFrontierRequest {
  // Maximum domains to return. 0 = all. Capped at synthesizer's
  // internal limit (default 100).
  uint32 limit = 1;
}

message QueryFrontierResponse {
  Frontier frontier = 1;
}

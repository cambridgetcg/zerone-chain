syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/knowledge/v1/types.proto";
import "zerone/knowledge/v1/genesis.proto";

// Msg defines the knowledge module's transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // ─── Submission lifecycle ──────────────────────────────────────────────────

  // SubmitData submits discourse for quality validation.
  rpc SubmitData(MsgSubmitData) returns (MsgSubmitDataResponse);

  // SubmitThread submits a complete conversation thread (batch).
  rpc SubmitThread(MsgSubmitThread) returns (MsgSubmitThreadResponse);

  // ─── Quality validation (commit-reveal) ────────────────────────────────────

  // SubmitCommitment submits a blinded quality score during commit phase.
  rpc SubmitCommitment(MsgSubmitCommitment) returns (MsgSubmitCommitmentResponse);

  // SubmitReveal reveals a validator's quality scores during reveal phase.
  rpc SubmitReveal(MsgSubmitReveal) returns (MsgSubmitRevealResponse);

  // ─── Data integrity ────────────────────────────────────────────────────────

  // ContestSample disputes a validated sample (consent, quality, duplication).
  rpc ContestSample(MsgContestSample) returns (MsgContestSampleResponse);

  // ─── Data preservation ─────────────────────────────────────────────────────

  // SponsorSample funds a sample to prevent it from being pruned.
  rpc SponsorSample(MsgSponsorSample) returns (MsgSponsorSampleResponse);

  // ─── Domain management ─────────────────────────────────────────────────────

  rpc ProposeDomain(MsgProposeDomain) returns (MsgProposeDomainResponse);
  rpc EndorseDomainProposal(MsgEndorseDomainProposal) returns (MsgEndorseDomainProposalResponse);

  // ─── Dataset curation ──────────────────────────────────────────────────────

  // CreateDataset creates a curated dataset definition.
  rpc CreateDataset(MsgCreateDataset) returns (MsgCreateDatasetResponse);

  // AccessDataset records a consumer accessing a dataset (triggers payment).
  rpc AccessDataset(MsgAccessDataset) returns (MsgAccessDatasetResponse);

  // AccessSample records individual sample access (triggers micro-payment).
  rpc AccessSample(MsgAccessSample) returns (MsgAccessSampleResponse);

  // ─── Demand & bounties ─────────────────────────────────────────────────────

  // ReportDemand reports training data demand from AI labs.
  rpc ReportDemand(MsgReportDemand) returns (MsgReportDemandResponse);

  // FundBounty creates or adds to a data collection bounty.
  rpc FundBounty(MsgFundBounty) returns (MsgFundBountyResponse);

  // ─── Feedback ──────────────────────────────────────────────────────────────

  // RateSample provides downstream quality feedback on a sample.
  rpc RateSample(MsgRateSample) returns (MsgRateSampleResponse);

  // ─── Governance ────────────────────────────────────────────────────────────

  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // ─── Scraped source registry ───────────────────────────────────────────────

  rpc AddScrapedSource(MsgAddScrapedSource) returns (MsgAddScrapedSourceResponse);
  rpc RemoveScrapedSource(MsgRemoveScrapedSource) returns (MsgRemoveScrapedSourceResponse);

  // ─── Research fund ─────────────────────────────────────────────────────────

  rpc ProposeResearchFund(MsgProposeResearchFund) returns (MsgProposeResearchFundResponse);
  rpc VoteResearchProposal(MsgVoteResearchProposal) returns (MsgVoteResearchProposalResponse);
  rpc ExecuteResearchProposal(MsgExecuteResearchProposal) returns (MsgExecuteResearchProposalResponse);

  // ─── Storage attestation ────────────────────────────────────────────────

  // AttestStorage submits a proof-of-storage attestation for an assigned shard.
  rpc AttestStorage(MsgAttestStorage) returns (MsgAttestStorageResponse);

  // ─── Consent management ──────────────────────────────────────────────────

  // RevokeConsent allows an author or submitter to withdraw consent.
  rpc RevokeConsent(MsgRevokeConsent) returns (MsgRevokeConsentResponse);

  // UpgradeConsent allows a submitter to upgrade the consent level.
  rpc UpgradeConsent(MsgUpgradeConsent) returns (MsgUpgradeConsentResponse);

  // ─── TEE attestation (T6-1) ───────────────────────────────────────────────

  // RegisterEnclave registers a TEE enclave with an attestation document.
  rpc RegisterEnclave(MsgRegisterEnclave) returns (MsgRegisterEnclaveResponse);

  // VerifyAttestation re-verifies a registered enclave's attestation.
  rpc VerifyAttestation(MsgVerifyAttestation) returns (MsgVerifyAttestationResponse);

  // SuspendEnclave suspends a registered enclave (authority only).
  rpc SuspendEnclave(MsgSuspendEnclave) returns (MsgSuspendEnclaveResponse);

  // RevokeEnclave permanently revokes a registered enclave (authority only).
  rpc RevokeEnclave(MsgRevokeEnclave) returns (MsgRevokeEnclaveResponse);

  // ─── Training (T6-3 / R43-1) ──────────────────────────────────────────────

  // RecordTraining records a completed TEE training run on-chain.
  rpc RecordTraining(MsgRecordTraining) returns (MsgRecordTrainingResponse);

  // UpdateFitnessBatch submits a batch of fitness signals for TDUs.
  rpc UpdateFitnessBatch(MsgUpdateFitnessBatch) returns (MsgUpdateFitnessBatchResponse);

  // ─── API revenue (R44-1) ───────────────────────────────────────────────────

  // CreateAPIKey registers an API key hash on-chain, binding it to a wallet.
  rpc CreateAPIKey(MsgCreateAPIKey) returns (MsgCreateAPIKeyResponse);

  // RevokeAPIKey deactivates an API key.
  rpc RevokeAPIKey(MsgRevokeAPIKey) returns (MsgRevokeAPIKeyResponse);

  // DepositAPICredits deposits ZRN into a prepaid API balance.
  rpc DepositAPICredits(MsgDepositAPICredits) returns (MsgDepositAPICreditsResponse);

  // WithdrawAPICredits withdraws unused API credits.
  rpc WithdrawAPICredits(MsgWithdrawAPICredits) returns (MsgWithdrawAPICreditsResponse);

  // RecordAPIUsage records batched API usage from the payment bridge.
  rpc RecordAPIUsage(MsgRecordAPIUsage) returns (MsgRecordAPIUsageResponse);

  // ─── Authority ─────────────────────────────────────────────────────────────

  // AddSample governance-creates a sample (authority-gated, for seed data).
  rpc AddSample(MsgAddSample) returns (MsgAddSampleResponse);
}

// ─── Submission lifecycle messages ────────────────────────────────────────────

message MsgSubmitData {
  option (cosmos.msg.v1.signer) = "submitter";

  string          submitter           = 1;
  string          content             = 2;
  SampleType      sample_type         = 3;
  string          domain              = 4;
  string          source_uri          = 5;
  string          source_platform     = 6;
  uint64          source_timestamp    = 7;
  ConsentProof    consent             = 8;
  string          original_author     = 9;
  string          license             = 10;
  repeated string tags                = 11;
  string          language            = 12;
  string          stake               = 13; // uzrn amount
  string          parent_submission_id = 14; // If part of thread
  string          thread_id           = 15;
  repeated string context_ids         = 16;
  bool            sponsored           = 17; // Request bootstrap fund sponsorship
}

message MsgSubmitDataResponse {
  string submission_id = 1;
}

message MsgSubmitThread {
  option (cosmos.msg.v1.signer) = "submitter";

  string                submitter = 1;
  repeated MsgSubmitData items    = 2; // Ordered conversation
  string                thread_id = 3; // Shared thread ID
  string                domain    = 4;
  string                stake     = 5; // Covers entire thread
}

message MsgSubmitThreadResponse {
  repeated string submission_ids = 1;
  string          thread_id      = 2;
}

// ─── Quality validation messages ──────────────────────────────────────────────

message MsgSubmitCommitment {
  option (cosmos.msg.v1.signer) = "verifier";

  string verifier    = 1;
  string round_id    = 2;
  bytes  commit_hash = 3; // SHA-256(quality_vote_json || salt)
}

message MsgSubmitCommitmentResponse {}

message MsgSubmitReveal {
  option (cosmos.msg.v1.signer) = "verifier";

  string      verifier = 1;
  string      round_id = 2;
  QualityVote scores   = 3; // Multi-dimensional quality scores
  bytes       salt     = 4;
}

message MsgSubmitRevealResponse {}

// ─── Data integrity messages ──────────────────────────────────────────────────

message MsgContestSample {
  option (cosmos.msg.v1.signer) = "challenger";

  string      challenger   = 1;
  string      sample_id    = 2;
  string      stake        = 3; // uzrn amount
  string      reason       = 4;
  ContestType contest_type = 5;
}

message MsgContestSampleResponse {
  string round_id = 1;
}

// ─── Data preservation messages ───────────────────────────────────────────────

message MsgSponsorSample {
  option (cosmos.msg.v1.signer) = "sponsor";

  string sponsor          = 1;
  string sample_id        = 2;
  string amount           = 3; // uzrn amount
  uint64 duration_blocks  = 4;
}

message MsgSponsorSampleResponse {}

// ─── Domain management messages ───────────────────────────────────────────────

message MsgProposeDomain {
  option (cosmos.msg.v1.signer) = "proposer";

  string proposer     = 1;
  string name         = 2;
  string description  = 3;
  string stratum      = 4;
  string stake        = 5; // uzrn amount
}

message MsgProposeDomainResponse {
  string proposal_id = 1;
}

message MsgEndorseDomainProposal {
  option (cosmos.msg.v1.signer) = "endorser";

  string endorser    = 1;
  string proposal_id = 2;
}

message MsgEndorseDomainProposalResponse {}

// ─── Dataset curation messages ────────────────────────────────────────────────

message MsgCreateDataset {
  option (cosmos.msg.v1.signer) = "curator";

  string          curator          = 1;
  string          name             = 2;
  string          description      = 3;
  string          domain           = 4;
  string          license          = 5;
  SampleType      filter_type      = 6;
  string          filter_language  = 7;
  repeated string filter_tags      = 8;
  uint64          min_quality      = 9;
  string          price_per_sample = 10;
  string          bulk_price       = 11;
}

message MsgCreateDatasetResponse {
  string dataset_id = 1;
}

message MsgAccessDataset {
  option (cosmos.msg.v1.signer) = "consumer";

  string consumer    = 1;
  string dataset_id  = 2;
  string max_payment = 3;
}

message MsgAccessDatasetResponse {
  string payment      = 1;
  uint64 sample_count = 2;
}

message MsgAccessSample {
  option (cosmos.msg.v1.signer) = "consumer";

  string consumer    = 1;
  string sample_id   = 2;
  string max_payment = 3;
}

message MsgAccessSampleResponse {
  string payment = 1;
}

// ─── Demand & bounty messages ─────────────────────────────────────────────────

message MsgReportDemand {
  option (cosmos.msg.v1.signer) = "reporter";

  string                reporter = 1;
  repeated DemandReport reports  = 2;
}

message DemandReport {
  string domain      = 1;
  string subject     = 2;
  uint64 queries     = 3;
  uint64 fulfilled   = 4;
  uint64 unfulfilled = 5;
}

message MsgReportDemandResponse {}

message MsgFundBounty {
  option (cosmos.msg.v1.signer) = "funder";

  string     funder         = 1;
  string     domain         = 2;
  string     topic          = 3;
  SampleType preferred_type = 4;
  string     language       = 5;
  string     amount         = 6;
  uint64     expires_blocks = 7;
}

message MsgFundBountyResponse {
  string bounty_id = 1;
}

// ─── Feedback messages ────────────────────────────────────────────────────────

message MsgRateSample {
  option (cosmos.msg.v1.signer) = "rater";

  string rater     = 1;
  string sample_id = 2;
  bool   useful    = 3;
  string memo      = 4;
}

message MsgRateSampleResponse {}

// ─── Governance messages ──────────────────────────────────────────────────────

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  Params params    = 2;
}

message MsgUpdateParamsResponse {}

// ─── Scraped source registry messages ─────────────────────────────────────────

message MsgAddScrapedSource {
  option (cosmos.msg.v1.signer) = "authority";

  string authority       = 1;
  string platform        = 2;
  string domain          = 3;
  string description     = 4;
  uint64 novelty_penalty = 5;
}

message MsgAddScrapedSourceResponse {
  string id = 1;
}

message MsgRemoveScrapedSource {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string id        = 2;
}

message MsgRemoveScrapedSourceResponse {}

// ─── Research fund governance messages ────────────────────────────────────────

message MsgProposeResearchFund {
  option (cosmos.msg.v1.signer) = "proposer";

  string proposer             = 1;
  string title                = 2;
  string description          = 3;
  string amount               = 4; // uzrn amount
  string recipient            = 5;
  uint64 voting_period_blocks = 6;
}

message MsgProposeResearchFundResponse {
  string proposal_id = 1;
}

message MsgVoteResearchProposal {
  option (cosmos.msg.v1.signer) = "voter";

  string voter       = 1;
  string proposal_id = 2;
  bool   vote        = 3;
}

message MsgVoteResearchProposalResponse {}

message MsgExecuteResearchProposal {
  option (cosmos.msg.v1.signer) = "authority";

  string authority   = 1;
  string proposal_id = 2;
}

message MsgExecuteResearchProposalResponse {}

// ─── Authority messages ───────────────────────────────────────────────────────

message MsgAddSample {
  option (cosmos.msg.v1.signer) = "authority";

  string     authority      = 1;
  string     content        = 2;
  SampleType sample_type    = 3;
  string     domain         = 4;
  string     source_uri     = 5;
  string     original_author = 6;
  string     license        = 7;
  uint64     quality_score  = 8; // initial quality (0-1,000,000)
}

message MsgAddSampleResponse {
  string sample_id = 1;
}

// ─── Storage attestation messages ────────────────────────────────────────────

message MsgAttestStorage {
  option (cosmos.msg.v1.signer) = "validator";

  string validator        = 1;
  int64  snapshot_height  = 2;
  string attestation_hex  = 3; // hex-encoded hash of assigned TDU data
}

message MsgAttestStorageResponse {}

// ─── Consent management messages ────────────────────────────────────────────

message MsgRevokeConsent {
  option (cosmos.msg.v1.signer) = "requester";

  string requester  = 1;  // Must be original_author or submitter
  string sample_id  = 2;
  string reason     = 3;
}

message MsgRevokeConsentResponse {}

message MsgUpgradeConsent {
  option (cosmos.msg.v1.signer) = "submitter";

  string       submitter    = 1;
  string       sample_id    = 2;
  ConsentProof new_consent  = 3;
}

message MsgUpgradeConsentResponse {
  ConsentType old_type = 1;
  ConsentType new_type = 2;
}

// ─── TEE attestation messages (T6-1) ──────────────────────────────────────────

message MsgRegisterEnclave {
  option (cosmos.msg.v1.signer) = "operator";

  string operator      = 1;  // Bech32 address of the enclave operator
  bytes  attestation   = 2;  // Serialized attestation document
  string provider      = 3;  // "nitro" | "sgx" | "sev"
  bytes  measurements  = 4;  // Expected code hash
}

message MsgRegisterEnclaveResponse {
  string enclave_id = 1;  // Unique ID for the registered enclave
}

message MsgVerifyAttestation {
  option (cosmos.msg.v1.signer) = "verifier";

  string verifier      = 1;  // Who is submitting the verification
  string operator      = 2;  // Enclave operator to verify
  bytes  attestation   = 3;  // Fresh attestation document
}

message MsgVerifyAttestationResponse {
  bool valid = 1;
}

message MsgSuspendEnclave {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string operator  = 2;  // Enclave operator to suspend
  string reason    = 3;
}

message MsgSuspendEnclaveResponse {}

message MsgRevokeEnclave {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string operator  = 2;  // Enclave operator to revoke
  string reason    = 3;
}

message MsgRevokeEnclaveResponse {}

// ─── Training messages (R43-1) ──────────────────────────────────────────────

message MsgRecordTraining {
  option (cosmos.msg.v1.signer) = "operator";

  string operator           = 1;
  string attestation_hash   = 2;
  string dataset_fingerprint = 3;
  int64  dataset_size       = 4;
  string base_model         = 5;
  string model_hash         = 6;
  string benchmark_score    = 7;
}

message MsgRecordTrainingResponse {
  string attestation_hash = 1;
}

// ─── Fitness batch messages (R43-1) ─────────────────────────────────────────

message MsgUpdateFitnessBatch {
  option (cosmos.msg.v1.signer) = "oracle";

  string                oracle = 1;
  repeated FitnessSignal signals = 2;
}

message MsgUpdateFitnessBatchResponse {
  uint64 processed = 1;
}

// ─── API revenue messages (R44-1) ──────────────────────────────────────────

message MsgCreateAPIKey {
  option (cosmos.msg.v1.signer) = "owner";

  string owner          = 1;  // Wallet address that owns this key
  string key_hash       = 2;  // SHA-256 hash of the API key
  string rate_limit_tier = 3; // "free", "standard", "premium"
}

message MsgCreateAPIKeyResponse {
  string key_hash = 1;
}

message MsgRevokeAPIKey {
  option (cosmos.msg.v1.signer) = "owner";

  string owner    = 1;  // Must match the key's wallet
  string key_hash = 2;  // Key to revoke
}

message MsgRevokeAPIKeyResponse {}

message MsgDepositAPICredits {
  option (cosmos.msg.v1.signer) = "depositor";

  string depositor = 1;  // Who is depositing
  string amount    = 2;  // uzrn amount to deposit
}

message MsgDepositAPICreditsResponse {
  string new_balance = 1;  // Balance after deposit
}

message MsgWithdrawAPICredits {
  option (cosmos.msg.v1.signer) = "wallet";

  string wallet = 1;  // Wallet to withdraw from
  string amount = 2;  // uzrn amount to withdraw
}

message MsgWithdrawAPICreditsResponse {
  string remaining_balance = 1;
}

message MsgRecordAPIUsage {
  option (cosmos.msg.v1.signer) = "bridge";

  string              bridge  = 1;  // Payment bridge address (authorized)
  repeated APIUsageBatch batches = 2;
}

message APIUsageBatch {
  string api_key_hash   = 1;
  uint64 input_tokens   = 2;
  uint64 output_tokens  = 3;
  uint64 request_count  = 4;
  string model_used     = 5;
}

message MsgRecordAPIUsageResponse {
  string total_deducted = 1;  // Total uzrn deducted across all batches
  uint64 batches_processed = 2;
}

syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

import "zerone/knowledge/v1/types.proto";

// Params are the governance parameters for the knowledge module.
// All BPS values use a 1,000,000 scale (1,000,000 = 100%).
message Params {
  // ─── Submission ─────────────────────────────────────────────────────────────
  string min_submission_stake         = 1;   // uzrn — default: "1000000" (1 ZRN)
  uint64 max_content_bytes            = 2;   // Max content size per submission — default: 50000 (50KB)
  uint64 max_thread_size              = 3;   // Max submissions per thread batch — default: 20

  // ─── Quality validation ─────────────────────────────────────────────────────
  uint64 commit_period_blocks         = 4;   // default: 4
  uint64 reveal_period_blocks         = 5;   // default: 4
  uint64 min_validators_per_round     = 6;   // default: 3
  uint64 max_validators_per_round     = 7;   // default: 22
  uint64 gold_threshold               = 8;   // Quality score >= this → gold (BPS) — default: 800000 (80%)
  uint64 silver_threshold             = 9;   // >= this → silver — default: 600000 (60%)
  uint64 bronze_threshold             = 10;  // >= this → bronze (below = reject) — default: 400000 (40%)
  uint64 max_toxicity_threshold       = 11;  // Above this → auto-reject — default: 200000 (20%)
  uint64 consent_required_weight      = 12;  // How much consent_valid matters (BPS) — default: 200000 (20%)

  // ─── Slashing ───────────────────────────────────────────────────────────────
  uint64 wrong_validation_slash_bps   = 13;  // default: 50000 (5%)
  uint64 missed_reveal_slash_bps      = 14;  // default: 100000 (10%)
  uint64 equivocation_slash_bps       = 15;  // default: 200000 (20%)

  // ─── Economics ──────────────────────────────────────────────────────────────
  string submitter_revenue_share_bps  = 16;  // 5500 = 55%
  string validator_revenue_share_bps  = 17;  // 2200 = 22%
  uint64 gold_quality_multiplier      = 18;  // 30000 = 3x (in BPS/10000)
  uint64 silver_quality_multiplier    = 19;  // 20000 = 2x
  uint64 bronze_quality_multiplier    = 20;  // 10000 = 1x
  string access_fee_per_sample        = 21;  // Default uzrn per access — default: "100000" (0.1 ZRN)

  // ─── Consent multipliers ────────────────────────────────────────────────────
  uint64 self_authored_multiplier     = 22;  // 15000 = 1.5x
  uint64 opt_in_multiplier            = 23;  // 13000 = 1.3x
  uint64 public_license_multiplier    = 24;  // 10000 = 1.0x
  uint64 platform_tos_multiplier      = 25;  // 8000 = 0.8x
  uint64 fair_use_multiplier          = 26;  // 5000 = 0.5x

  // ─── Ecology (kept from knowledge) ──────────────────────────────────────────
  uint64 energy_decay_rate            = 27;  // BPS per epoch — default: 50000 (5%)
  uint64 energy_per_access            = 28;  // Energy earned per sample access — default: 1000
  uint64 prune_grace_epochs           = 29;  // Epochs before pruning zero-energy samples — default: 10
  uint64 niche_saturation_threshold   = 30;  // Max samples in a niche before penalties — default: 50
  uint64 novelty_bonus_bps            = 31;  // Bonus for novel submissions — default: 100000 (10%)

  // ─── Bounties ───────────────────────────────────────────────────────────────
  uint64 auto_bounty_threshold        = 32;  // Demand count that triggers auto-bounty — default: 100
  string auto_bounty_amount           = 33;  // uzrn per auto-bounty — default: "10000000" (10 ZRN)

  // ─── Research fund (kept) ───────────────────────────────────────────────────
  uint64 research_tax_bps             = 34;  // default: 70000 (7%)
  string research_fund_address        = 35;
  uint64 founder_share_bps            = 36;  // default: 80000 (8%)
  string founder_address              = 37;
  uint64 ai_operations_share_bps      = 38;  // default: 30000 (3%)
  string ai_operations_address        = 39;
}

// GenesisState is the genesis state of the knowledge module.
message GenesisState {
  Params                         params               = 1;
  repeated Sample                samples              = 2;   // Seed samples
  repeated Submission            submissions           = 3;   // Pending at export
  repeated QualityRound          quality_rounds        = 4;   // Active rounds at export
  repeated Domain                domains               = 5;   // Seed domains
  repeated Dataset               datasets              = 6;
  repeated TrainingDemand        demands               = 7;
  repeated DataBounty            bounties              = 8;
  repeated ScrapedSourceEntry    scraped_sources       = 9;
  repeated ValidatorInfo         validators            = 10;
  uint64                         next_sample_seq       = 11;
  uint64                         next_submission_seq   = 12;
  uint64                         next_round_seq        = 13;
  uint64                         next_dataset_seq      = 14;

  // ─── New ToK state (R43-1) ──────────────────────────────────────────────
  repeated FitnessRecord         fitness_records       = 15;
  repeated ReputationRecord      reputation_records    = 16;
  repeated ShardAssignment       shard_assignments     = 17;
  repeated AttestationRecord     attestation_records   = 18;
  repeated RegisteredEnclave     enclaves              = 19;
  repeated TrainingRecord        training_records      = 20;

  // ─── New params (R43-1) ─────────────────────────────────────────────────
  FitnessParams                  fitness_params        = 21;
  ReputationDecayParams          reputation_params     = 22;
  ShardingParams                 sharding_params       = 23;
  ReviewerStakingParams          reviewer_staking_params = 24;
}

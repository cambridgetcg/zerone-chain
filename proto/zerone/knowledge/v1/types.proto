syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

// ═══════════════════════════════════════════════════════════════════════════════
// Enums
// ═══════════════════════════════════════════════════════════════════════════════

// SampleType classifies the discourse format of a training data sample.
enum SampleType {
  SAMPLE_TYPE_UNSPECIFIED    = 0;
  SAMPLE_TYPE_DISCUSSION     = 1;   // Multi-party conversation
  SAMPLE_TYPE_DEBATE         = 2;   // Opposing viewpoints argued
  SAMPLE_TYPE_EXPLANATION    = 3;   // Someone explaining a concept
  SAMPLE_TYPE_TROUBLESHOOT   = 4;   // Problem → diagnosis → solution
  SAMPLE_TYPE_REVIEW         = 5;   // Evaluation/critique
  SAMPLE_TYPE_TUTORIAL       = 6;   // Step-by-step teaching
  SAMPLE_TYPE_OPINION        = 7;   // Reasoned opinion with arguments
  SAMPLE_TYPE_NARRATIVE      = 8;   // Storytelling, personal experience
  SAMPLE_TYPE_Q_AND_A        = 9;   // Question and answer(s)
  SAMPLE_TYPE_CREATIVE       = 10;  // Creative writing, poetry, humor
  SAMPLE_TYPE_ANNOTATION     = 11;  // Human annotation/labeling
  SAMPLE_TYPE_CORRECTION     = 12;  // Correcting misinformation
}

// SampleStatus represents the lifecycle state of a validated training sample.
enum SampleStatus {
  SAMPLE_STATUS_UNSPECIFIED  = 0;
  SAMPLE_STATUS_PENDING      = 1;   // Awaiting quality validation
  SAMPLE_STATUS_IN_REVIEW    = 2;   // Quality round in progress
  SAMPLE_STATUS_GOLD         = 3;   // Exceptional quality
  SAMPLE_STATUS_SILVER       = 4;   // Good quality
  SAMPLE_STATUS_BRONZE       = 5;   // Acceptable quality
  SAMPLE_STATUS_REJECTED     = 6;   // Not useful
  SAMPLE_STATUS_CONTESTED    = 7;   // Under dispute
  SAMPLE_STATUS_EXPIRED      = 8;   // Energy depleted
  SAMPLE_STATUS_PRUNED       = 9;   // Removed from active set
}

// SubmissionStatus represents the lifecycle state of a raw submission.
enum SubmissionStatus {
  SUBMISSION_STATUS_UNSPECIFIED       = 0;
  SUBMISSION_STATUS_PENDING           = 1;
  SUBMISSION_STATUS_PENDING_REVIEW    = 2;
  SUBMISSION_STATUS_REVIEWED          = 3;
  SUBMISSION_STATUS_ACCEPTED          = 4;
  SUBMISSION_STATUS_REJECTED          = 5;
  SUBMISSION_STATUS_CONSENT_FAILED    = 6;
  SUBMISSION_STATUS_DUPLICATE         = 7;
}

// VerificationPhase tracks progress of a commit-reveal quality round.
enum VerificationPhase {
  VERIFICATION_PHASE_UNSPECIFIED  = 0;
  VERIFICATION_PHASE_COMMIT       = 1;
  VERIFICATION_PHASE_REVEAL       = 2;
  VERIFICATION_PHASE_AGGREGATION  = 3;
  VERIFICATION_PHASE_COMPLETE     = 4;
  VERIFICATION_PHASE_EXPIRED      = 5;
}

// QualityVerdict is the outcome of a completed quality round.
enum QualityVerdict {
  QUALITY_VERDICT_UNSPECIFIED   = 0;
  QUALITY_VERDICT_GOLD          = 1;
  QUALITY_VERDICT_SILVER        = 2;
  QUALITY_VERDICT_BRONZE        = 3;
  QUALITY_VERDICT_REJECT        = 4;
  QUALITY_VERDICT_CONSENT_FAIL  = 5;
}

// ConsentType classifies how consent was obtained for the training data.
enum ConsentType {
  CONSENT_TYPE_UNSPECIFIED     = 0;
  CONSENT_TYPE_SELF_AUTHORED   = 1;  // Submitter is the author (strongest)
  CONSENT_TYPE_OPT_IN          = 2;  // Author explicitly opted in
  CONSENT_TYPE_PUBLIC_LICENSE   = 3;  // CC-BY or similar open license
  CONSENT_TYPE_PLATFORM_TOS    = 4;  // Platform TOS permits this use
  CONSENT_TYPE_FAIR_USE        = 5;  // Fair use claim (weakest)
}

// DomainStatus tracks whether a data domain is active or proposed.
enum DomainStatus {
  DOMAIN_STATUS_UNSPECIFIED = 0;
  DOMAIN_STATUS_ACTIVE      = 1;
  DOMAIN_STATUS_DEPRECATED  = 2;
  DOMAIN_STATUS_PROPOSED    = 3;
}

// ContestType classifies the reason for contesting a sample.
enum ContestType {
  CONTEST_TYPE_UNSPECIFIED  = 0;
  CONTEST_TYPE_CONSENT      = 1;  // Consent proof is invalid
  CONTEST_TYPE_QUALITY      = 2;  // Quality was mis-scored
  CONTEST_TYPE_DUPLICATE    = 3;  // Already exists in dataset
  CONTEST_TYPE_TOXIC        = 4;  // Harmful content not labeled
  CONTEST_TYPE_COPYRIGHT    = 5;  // Copyright violation
}

// ═══════════════════════════════════════════════════════════════════════════════
// Core Messages
// ═══════════════════════════════════════════════════════════════════════════════

// ConsentProof records how consent was obtained for using source content.
message ConsentProof {
  ConsentType type           = 1;
  string proof_uri           = 2;   // Link to consent evidence
  string author_signature    = 3;   // Optional cryptographic consent
  uint64 consent_timestamp   = 4;   // Unix timestamp
  string consent_terms       = 5;   // What was consented to
}

// Submission is a raw discourse excerpt awaiting quality validation.
// Replaces the old Claim message.
message Submission {
  string id                     = 1;
  string submitter              = 2;
  string content                = 3;
  SampleType sample_type        = 4;
  string domain                 = 5;
  string source_uri             = 6;
  string source_platform        = 7;
  uint64 source_timestamp       = 8;
  string parent_submission_id   = 9;
  repeated string context_ids   = 10;
  string thread_id              = 11;
  ConsentProof consent          = 12;
  string original_author        = 13;
  string license                = 14;
  repeated string tags          = 15;
  string language               = 16;
  string stake                  = 17;
  uint64 submitted_at_block     = 18;
  SubmissionStatus status       = 19;
  string content_hash           = 20;
  string quality_round_id       = 21;
  bool   sponsored              = 22;
}

// Sample is a validated, quality-scored training data unit.
// Replaces the old Fact message.
message Sample {
  string id                     = 1;
  string content                = 2;
  SampleType sample_type        = 3;
  string domain                 = 4;
  string source_uri             = 5;
  string source_platform        = 6;
  uint64 source_timestamp       = 7;

  // Quality
  uint64 quality_score          = 8;
  string quality_tier           = 9;
  uint64 novelty_score          = 10;
  uint64 diversity_score        = 11;
  uint64 reasoning_depth        = 12;

  // Provenance
  string submitter              = 13;
  string original_author        = 14;
  ConsentProof consent          = 15;
  string license                = 16;
  string submission_id          = 17;

  // Thread context
  string thread_id              = 18;
  string parent_sample_id       = 19;
  repeated string child_sample_ids = 20;
  uint64 thread_position        = 21;
  uint64 thread_depth           = 22;

  // Economics
  uint64 access_count           = 23;
  string total_revenue          = 24;
  string patronage_amount       = 25;
  uint64 patronage_expiry_block = 26;

  // Lifecycle
  SampleStatus status           = 27;
  uint64 verified_at_block      = 28;
  uint64 last_accessed_block    = 29;

  // Fitness / ecology
  uint64 fitness_score          = 30;
  uint64 fitness_updated_block  = 31;
  uint64 energy                 = 32;
  uint64 energy_cap             = 33;
  uint64 energy_last_updated    = 34;
  uint64 at_risk_since_epoch    = 35;

  // Tags & search
  repeated string tags          = 36;
  string language               = 37;
  repeated string topics        = 38;

  // Niche dynamics
  string niche_key              = 39;
  bool   niche_leader           = 40;
  uint64 niche_rank             = 41;
  uint64 niche_size             = 42;
  uint64 competition_tax        = 43;
}

// QualityVote records a validator's multi-dimensional quality assessment.
message QualityVote {
  uint64 overall_quality   = 1;
  uint64 reasoning_depth   = 2;
  uint64 novelty           = 3;
  uint64 toxicity          = 4;
  uint64 factual_accuracy  = 5;
  bool   consent_valid     = 6;
  bool   duplicate         = 7;
  string notes             = 8;
}

// ═══════════════════════════════════════════════════════════════════════════════
// Quality Round (commit-reveal, adapted from VerificationRound)
// ═══════════════════════════════════════════════════════════════════════════════

// QualityRound tracks one commit-reveal quality validation cycle.
// Replaces the old VerificationRound message.
message QualityRound {
  string id                       = 1;
  string submission_id            = 2;
  uint64 started_at_block         = 3;
  VerificationPhase phase         = 4;
  repeated string selected_verifiers = 5;
  repeated CommitEntry commits    = 6;
  repeated RevealEntry reveals    = 7;
  QualityVerdict verdict          = 8;
  uint64 verdict_block            = 9;
  uint64 commit_deadline          = 10;
  uint64 reveal_deadline          = 11;
  uint64 aggregation_deadline     = 12;
  QualityVote aggregate_scores    = 13;
}

// CommitEntry records a validator's blinded commitment (SHA-256(vote || salt)).
message CommitEntry {
  string verifier          = 1;
  bytes  commit_hash       = 2; // SHA-256(vote || salt)
  uint64 committed_at_block = 3;
}

// RevealEntry records a validator's revealed quality vote and salt.
message RevealEntry {
  string verifier         = 1;
  string vote             = 2; // Serialized QualityVote JSON
  bytes  salt             = 3;
  uint64 revealed_at_block = 4;
}

// VRFProof captures a Verifiable Random Function output for validator selection.
message VRFProof {
  bytes  proof        = 1;
  bytes  output       = 2;
  string proposer     = 3;
  uint64 block_height = 4;
}

// ═══════════════════════════════════════════════════════════════════════════════
// Domain & Validator
// ═══════════════════════════════════════════════════════════════════════════════

// Domain is a data domain (e.g., "technical", "culture", "science").
message Domain {
  string name             = 1;
  string description      = 2;
  DomainStatus status     = 3;
  uint64 created_at_block = 4;
  uint64 fact_count       = 5;
  string proposer         = 6;
  repeated string endorsers = 7;
  string stratum          = 8;
  string parent_domain    = 9;  // empty = root domain
  uint32 depth            = 10; // tree depth: root=1, child=parent.depth+1, max=5
}

// ValidatorInfo caches a validator's tier and quality scoring stats.
message ValidatorInfo {
  string address           = 1;
  uint64 stake             = 2; // in uzrn
  string tier              = 3; // "apprentice", "verified", "bonded", "guardian"
  uint64 verification_count = 4;
  uint64 accuracy_bps      = 5; // 0-1,000,000
}

// ═══════════════════════════════════════════════════════════════════════════════
// Demand & Bounties
// ═══════════════════════════════════════════════════════════════════════════════

// TrainingDemand tracks aggregate demand for training data in a domain/topic.
// Replaces the old DemandSignal message.
message TrainingDemand {
  string domain               = 1;
  string subject              = 2;  // Normalized query subject
  uint64 query_count          = 3;  // Total queries (lifetime)
  uint64 fulfilled_count      = 4;  // Queries that returned results
  uint64 unfulfilled_count    = 5;  // Queries that returned nothing
  uint64 last_query_block     = 6;
  uint64 epoch_query_count    = 7;  // Queries this epoch (resets)
  uint64 epoch_unfulfilled    = 8;  // Unfulfilled this epoch (resets)
  SampleType preferred_type   = 9;
  string language             = 10;
  uint64 bounty_pool          = 11;
}

// DataBounty is a reward for filling a training data gap.
// Replaces the old KnowledgeBounty message.
message DataBounty {
  string id                   = 1;
  string domain               = 2;
  string subject              = 3;
  string reward_amount        = 4;  // uzrn
  uint64 created_at_block     = 5;
  uint64 expires_at_block     = 6;
  bool   claimed              = 7;
  string claimed_by_sample_id = 8;
  uint64 demand_count         = 9;  // Demand that triggered this bounty
}

// ═══════════════════════════════════════════════════════════════════════════════
// New Messages
// ═══════════════════════════════════════════════════════════════════════════════

// ScrapedSourceEntry tracks sources already heavily scraped by AI labs.
// Replaces the old CommonKnowledgeEntry message.
message ScrapedSourceEntry {
  string id              = 1;
  string platform        = 2;  // "reddit", "stackoverflow", etc.
  string domain          = 3;
  string description     = 4;
  uint64 novelty_penalty = 5;  // 0-1,000,000
  uint64 added_block     = 6;
}

// Dataset is a curated collection of samples for bulk access.
message Dataset {
  string id              = 1;
  string name            = 2;
  string description     = 3;
  string domain          = 4;
  string license         = 5;
  uint64 sample_count    = 6;
  uint64 total_tokens    = 7;
  string price_per_sample = 8;
  string bulk_price      = 9;
  string curator         = 10;
  repeated string filter_tags = 11;
  SampleType filter_type = 12;
  string filter_language = 13;
  uint64 min_quality     = 14;  // Minimum quality_score for inclusion
  uint64 created_at_block = 15;
  uint64 updated_at_block = 16;
}

// ConsentEvent records a consent-related action for audit purposes.
message ConsentEvent {
  string sample_id   = 1;
  string event_type  = 2;  // "granted", "revocation", "upgraded", "challenged", "verified"
  string actor       = 3;
  string reason      = 4;
  uint64 block       = 5;
  ConsentType old_consent_type = 6;
  ConsentType new_consent_type = 7;
}

// CompletedRoundMeta stores metadata for completed quality rounds,
// indexed by verdict block height for efficient window-based queries.
message CompletedRoundMeta {
  string domain          = 1;
  bool   has_dissent     = 2;  // true if any verifier dissented from majority
  uint64 duration_blocks = 3;  // verdict_block - started_at_block
}

// ═══════════════════════════════════════════════════════════════════════════════
// TEE Attestation (T6-1)
// ═══════════════════════════════════════════════════════════════════════════════

// EnclaveStatus represents the lifecycle state of a registered TEE enclave.
enum EnclaveStatus {
  ENCLAVE_STATUS_UNSPECIFIED = 0;
  ENCLAVE_STATUS_ACTIVE      = 1;  // Enclave is active and verified
  ENCLAVE_STATUS_SUSPENDED   = 2;  // Temporarily suspended (attestation expired)
  ENCLAVE_STATUS_REVOKED     = 3;  // Permanently revoked
}

// RegisteredEnclave represents a TEE enclave registered on-chain.
message RegisteredEnclave {
  string operator          = 1;  // Bech32 address of the enclave operator
  string provider          = 2;  // "nitro" | "sgx" | "sev"
  bytes  measurements      = 3;  // Expected code hash (enclave identity)
  bytes  attestation_hash  = 4;  // SHA-256 of the attestation document
  int64  registered_at     = 5;  // Block height when registered
  int64  last_verified     = 6;  // Block height of last successful verification
  EnclaveStatus status     = 7;  // Current lifecycle status
}

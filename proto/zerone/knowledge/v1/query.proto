syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

import "cosmos/base/query/v1beta1/pagination.proto";
import "google/api/annotations.proto";
import "zerone/knowledge/v1/types.proto";
import "zerone/knowledge/v1/genesis.proto";

// Query defines the gRPC query service for the knowledge module.
service Query {
  // ─── Samples ───────────────────────────────────────────────────────────────

  // Sample queries a single sample by ID.
  rpc Sample(QuerySampleRequest) returns (QuerySampleResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/samples/{id}";
  }

  // Samples queries samples with optional filters.
  rpc Samples(QuerySamplesRequest) returns (QuerySamplesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/samples";
  }

  // SamplesByDomain queries all samples in a domain.
  rpc SamplesByDomain(QuerySamplesByDomainRequest) returns (QuerySamplesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/samples/domain/{domain}";
  }

  // SamplesByThread queries all samples in a conversation thread.
  rpc SamplesByThread(QuerySamplesByThreadRequest) returns (QuerySamplesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/samples/thread/{thread_id}";
  }

  // SamplesBySubmitter queries all samples submitted by an address.
  rpc SamplesBySubmitter(QuerySamplesBySubmitterRequest) returns (QuerySamplesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/samples/submitter/{submitter}";
  }

  // ─── Submissions ───────────────────────────────────────────────────────────

  // Submission queries a single submission by ID.
  rpc Submission(QuerySubmissionRequest) returns (QuerySubmissionResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/submissions/{id}";
  }

  // PendingSubmissions queries all pending submissions.
  rpc PendingSubmissions(QueryPendingSubmissionsRequest) returns (QuerySubmissionsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/submissions/pending";
  }

  // ─── Quality rounds ────────────────────────────────────────────────────────

  // QualityRound queries a quality round by ID.
  rpc QualityRound(QueryQualityRoundRequest) returns (QueryQualityRoundResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/rounds/{id}";
  }

  // ─── Datasets ──────────────────────────────────────────────────────────────

  // Dataset queries a dataset by ID.
  rpc Dataset(QueryDatasetRequest) returns (QueryDatasetResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/datasets/{id}";
  }

  // Datasets queries all datasets with optional filters.
  rpc Datasets(QueryDatasetsRequest) returns (QueryDatasetsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/datasets";
  }

  // ─── Demand & bounties ─────────────────────────────────────────────────────

  // TrainingDemand queries training demand data.
  rpc TrainingDemand(QueryTrainingDemandRequest) returns (QueryTrainingDemandResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/demand";
  }

  // DataBounties queries active data bounties.
  rpc DataBounties(QueryDataBountiesRequest) returns (QueryDataBountiesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/bounties";
  }

  // ─── Domains ───────────────────────────────────────────────────────────────

  // Domain queries a domain by name.
  rpc Domain(QueryDomainRequest) returns (QueryDomainResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/domains/{name}";
  }

  // Domains queries all domains with optional pagination.
  rpc Domains(QueryDomainsRequest) returns (QueryDomainsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/domains";
  }

  // ─── Stats ─────────────────────────────────────────────────────────────────

  // DomainStats queries statistics for a specific domain.
  rpc DomainStats(QueryDomainStatsRequest) returns (QueryDomainStatsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/stats/domain/{domain}";
  }

  // ProtocolStats queries aggregate protocol statistics.
  rpc ProtocolStats(QueryProtocolStatsRequest) returns (QueryProtocolStatsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/stats";
  }

  // ─── Consent ──────────────────────────────────────────────────────────────

  // ConsentHistory queries the consent audit trail for a sample.
  rpc ConsentHistory(QueryConsentHistoryRequest) returns (QueryConsentHistoryResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/consent/{sample_id}";
  }

  // ─── Params ────────────────────────────────────────────────────────────────

  // Params queries module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/params";
  }

  // ─── Submissions (filtered) ──────────────────────────────────────────────

  // Submissions queries submissions with status, domain, and submitter filters.
  rpc Submissions(QuerySubmissionsFilteredRequest) returns (QuerySubmissionsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/submissions";
  }

  // ─── Dashboard ───────────────────────────────────────────────────────────

  // Dashboard returns an agent's aggregated activity summary.
  rpc Dashboard(QueryDashboardRequest) returns (QueryDashboardResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/dashboard/{address}";
  }

  // ─── Reputation ──────────────────────────────────────────────────────────

  // Reputation queries an agent's reputation, optionally filtered by domain.
  rpc Reputation(QueryReputationRequest) returns (QueryReputationResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/reputation/{address}";
  }

  // Leaderboard queries top agents by reputation in a domain.
  rpc Leaderboard(QueryLeaderboardRequest) returns (QueryLeaderboardResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/leaderboard";
  }

  // ─── Stakes ──────────────────────────────────────────────────────────────

  // Stakes queries active stakes for an agent across quality rounds.
  rpc Stakes(QueryStakesRequest) returns (QueryStakesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/stakes/{address}";
  }

  // ActiveRounds queries quality rounds where a reviewer is an active participant.
  rpc ActiveRounds(QueryActiveRoundsRequest) returns (QueryActiveRoundsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/rounds/active";
  }

  // ─── Quality rounds (filtered) ──────────────────────────────────────────

  // QualityRounds queries rounds with optional phase filter.
  rpc QualityRounds(QueryQualityRoundsRequest) returns (QueryQualityRoundsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/rounds";
  }

  // ─── Fitness ─────────────────────────────────────────────────────────────

  // Fitness queries the fitness record for a TDU (sample).
  rpc Fitness(QueryFitnessRequest) returns (QueryFitnessResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fitness/{tdu_id}";
  }

  // FitnessSummary queries aggregate fitness stats by lifecycle status and domain.
  rpc FitnessSummary(QueryFitnessSummaryRequest) returns (QueryFitnessSummaryResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fitness";
  }

  // ─── Sharding ────────────────────────────────────────────────────────────

  // Shard queries a validator's shard assignment at a snapshot height.
  rpc Shard(QueryShardRequest) returns (QueryShardResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/shard/{validator}";
  }

  // ShardStatus queries global sharding status.
  rpc ShardStatus(QueryShardStatusRequest) returns (QueryShardStatusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/shard-status";
  }

  // ─── TEE Enclaves (T6-1) ──────────────────────────────────────────────────

  // Enclave queries a registered enclave by operator address.
  rpc Enclave(QueryEnclaveRequest) returns (QueryEnclaveResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/enclaves/{operator}";
  }

  // Enclaves queries all registered enclaves with optional status filter.
  rpc Enclaves(QueryEnclavesRequest) returns (QueryEnclavesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/enclaves";
  }

  // ─── Training (R43-1) ───────────────────────────────────────────────────

  // TrainingHistory queries training records for an operator.
  rpc TrainingHistory(QueryTrainingHistoryRequest) returns (QueryTrainingHistoryResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/{operator}";
  }
}

// ─── Sample query messages ────────────────────────────────────────────────────

message QuerySampleRequest {
  string id = 1;
}

message QuerySampleResponse {
  Sample sample = 1;
}

message QuerySamplesRequest {
  string     domain      = 1;
  string     status      = 2;
  SampleType sample_type = 3;
  cosmos.base.query.v1beta1.PageRequest pagination = 4;
}

message QuerySamplesResponse {
  repeated Sample samples = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QuerySamplesByDomainRequest {
  string domain = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QuerySamplesByThreadRequest {
  string thread_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QuerySamplesBySubmitterRequest {
  string submitter = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// ─── Submission query messages ────────────────────────────────────────────────

message QuerySubmissionRequest {
  string id = 1;
}

message QuerySubmissionResponse {
  Submission submission = 1;
}

message QueryPendingSubmissionsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QuerySubmissionsResponse {
  repeated Submission submissions = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// ─── Quality round query messages ─────────────────────────────────────────────

message QueryQualityRoundRequest {
  string id = 1;
}

message QueryQualityRoundResponse {
  QualityRound round = 1;
}

// ─── Dataset query messages ───────────────────────────────────────────────────

message QueryDatasetRequest {
  string id = 1;
}

message QueryDatasetResponse {
  Dataset dataset = 1;
}

message QueryDatasetsRequest {
  string domain = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryDatasetsResponse {
  repeated Dataset datasets = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// ─── Demand & bounty query messages ───────────────────────────────────────────

message QueryTrainingDemandRequest {
  string domain = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryTrainingDemandResponse {
  repeated TrainingDemand signals = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryDataBountiesRequest {
  string domain = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryDataBountiesResponse {
  repeated DataBounty bounties = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// ─── Domain query messages ────────────────────────────────────────────────────

message QueryDomainRequest {
  string name = 1;
}

message QueryDomainResponse {
  Domain domain = 1;
}

message QueryDomainsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryDomainsResponse {
  repeated Domain domains = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// ─── Stats query messages ─────────────────────────────────────────────────────

message QueryDomainStatsRequest {
  string domain = 1;
}

message QueryDomainStatsResponse {
  string domain          = 1;
  uint64 sample_count    = 2;
  uint64 pending_count   = 3;
  uint64 gold_count      = 4;
  uint64 silver_count    = 5;
  uint64 bronze_count    = 6;
  uint64 rejected_count  = 7;
  string total_revenue   = 8;
  uint64 active_bounties = 9;
}

message QueryProtocolStatsRequest {}

message QueryProtocolStatsResponse {
  uint64 total_samples       = 1;
  uint64 total_submissions   = 2;
  uint64 total_datasets      = 3;
  uint64 total_domains       = 4;
  uint64 active_rounds       = 5;
  string total_revenue       = 6;
  uint64 total_access_count  = 7;
}

// ─── Params query messages ────────────────────────────────────────────────────

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1;
}

// ─── Consent query messages ─────────────────────────────────────────────────

message QueryConsentHistoryRequest {
  string sample_id = 1;
}

message QueryConsentHistoryResponse {
  repeated ConsentEvent events = 1;
}

// ─── Submissions (filtered) query messages ──────────────────────────────────

message QuerySubmissionsFilteredRequest {
  string status    = 1;
  string domain    = 2;
  string submitter = 3;
  uint64 limit     = 4;
  cosmos.base.query.v1beta1.PageRequest pagination = 5;
}

// ─── Dashboard query messages ───────────────────────────────────────────────

message QueryDashboardRequest {
  string address = 1;
}

message QueryDashboardResponse {
  string address              = 1;
  uint64 total_submissions    = 2;
  uint64 accepted_submissions = 3;
  uint64 rejected_submissions = 4;
  uint64 pending_submissions  = 5;
  string acceptance_rate      = 6;  // e.g. "82.5"
  repeated ReputationEntry reputations = 7;
  repeated StakeEntry active_stakes    = 8;
  repeated FitnessEntry tdu_fitness    = 9;
  uint64 pending_reviews      = 10;
}

message ReputationEntry {
  string domain     = 1;
  string score      = 2;
  string peak_score = 3;
}

message StakeEntry {
  string submission_id = 1;
  string round_id      = 2;
  string stake_amount  = 3;
  string phase         = 4;
}

message FitnessEntry {
  string sample_id       = 1;
  string fitness_score   = 2;
  string lifecycle_status = 3;
}

// ─── Reputation query messages ──────────────────────────────────────────────

message QueryReputationRequest {
  string address = 1;
  string domain  = 2;
}

message QueryReputationResponse {
  repeated ReputationEntry reputations = 1;
}

message QueryLeaderboardRequest {
  string domain = 1;
  uint64 limit  = 2;
}

message LeaderboardEntry {
  string address    = 1;
  string domain     = 2;
  string score      = 3;
  string peak_score = 4;
}

message QueryLeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
}

// ─── Stakes query messages ──────────────────────────────────────────────────

message QueryStakesRequest {
  string address = 1;
}

message QueryStakesResponse {
  repeated StakeEntry stakes = 1;
}

message QueryActiveRoundsRequest {
  string reviewer = 1;
  uint64 limit    = 2;
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}

message QueryActiveRoundsResponse {
  repeated QualityRound rounds = 1;
}

// ─── Quality rounds (filtered) query messages ──────────────────────────────

message QueryQualityRoundsRequest {
  string status = 1;  // phase filter: commit, reveal, aggregating
  uint64 limit  = 2;
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}

message QueryQualityRoundsResponse {
  repeated QualityRound rounds = 1;
}

// ─── Fitness query messages ─────────────────────────────────────────────────

message QueryFitnessRequest {
  string tdu_id = 1;
}

message QueryFitnessResponse {
  string sample_id        = 1;
  string fitness_score    = 2;
  string lifecycle_status = 3;
  string original_stake   = 4;
  uint64 last_signal_cycle = 5;
  uint64 cycle_count      = 6;
}

message QueryFitnessSummaryRequest {
  string status = 1;  // core, active, dormant, pruned
  string domain = 2;
}

message QueryFitnessSummaryResponse {
  uint64 core_count    = 1;
  uint64 active_count  = 2;
  uint64 dormant_count = 3;
  uint64 pruned_count  = 4;
  uint64 total_count   = 5;
}

// ─── Sharding query messages ────────────────────────────────────────────────

message QueryShardRequest {
  string validator       = 1;
  int64  snapshot_height = 2;
}

message QueryShardResponse {
  string   validator       = 1;
  int64    snapshot_height = 2;
  repeated string tdu_ids  = 3;
  bool     attested        = 4;
}

message QueryShardStatusRequest {}

message QueryShardStatusResponse {
  uint64 snapshot_interval    = 1;
  int64  last_snapshot_height = 2;
  uint64 total_assignments    = 3;
  uint64 total_attestations   = 4;
  uint32 replication_factor   = 5;
  uint32 min_validators       = 6;
}

// ─── TEE Enclave query messages (T6-1) ──────────────────────────────────────

message QueryEnclaveRequest {
  string operator = 1;
}

message QueryEnclaveResponse {
  RegisteredEnclave enclave = 1;
}

message QueryEnclavesRequest {
  string status = 1;  // Optional: "active", "suspended", "revoked"
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryEnclavesResponse {
  repeated RegisteredEnclave enclaves = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// ─── Training query messages (R43-1) ────────────────────────────────────────

message QueryTrainingHistoryRequest {
  string operator = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryTrainingHistoryResponse {
  repeated TrainingRecord records = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

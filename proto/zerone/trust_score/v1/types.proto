syntax = "proto3";
package zerone.trust_score.v1;

option go_package = "github.com/zerone-chain/zerone/x/trust_score/types";

// TrustScore is a per-address synthesis of every signal the chain has
// accumulated about a participant: their submission accuracy, their
// verification accuracy across all domains they're qualified in, their
// cartel-strike history, and their currently-active qualification
// penalties.
//
// The composite is a CURRENT statement, not an immutable record.
// Re-querying at a later block gives a possibly-different score —
// because new verdicts have landed, qualifications have decayed,
// penalties have expired, cartels have been resolved. Trust is
// continuous; this synthesizer makes it queryable.
//
// Every reward path that today picks ONE of these signals (panel weight
// reads qualification; calibration disbursement reads global score) can
// in principle read this composite instead. That migration is future
// work; this module establishes the synthesis surface first.
message TrustScore {
  string address = 1;

  // ── Component scores (each 0..1_000_000 BPS) ─────────────────────
  // submission_accuracy is the global Popper-weighted calibration —
  // when this address has submitted facts, what fraction survived
  // verification and corroboration?
  uint64 submission_accuracy_bps = 2;
  // verification_accuracy is the cross-domain weighted average of
  // qualification AccuracyBps. Each domain's accuracy is weighted by
  // the address's qualification weight in that domain so a high-
  // accuracy weak qualification doesn't drown out a moderate-accuracy
  // primary expertise.
  uint64 verification_accuracy_bps = 3;

  // ── Strike history (count, not score) ────────────────────────────
  // Number of UPHELD capture_challenge resolutions naming this
  // address as accused. Each strike is a confirmed cartel
  // implication. Heavy weight in the composite: a single strike
  // drops the band by at least one letter.
  uint32 cartel_strikes = 4;
  // Number of currently-active QualificationPenalty records (i.e.,
  // ExpiryHeight > current block) across all domains for this
  // address. Distinct from cartel_strikes — a strike is historical;
  // a penalty is current.
  uint32 active_penalties = 5;

  // ── Composite ────────────────────────────────────────────────────
  uint64 composite_bps = 6;     // overall score in BPS
  string band          = 7;     // "A", "B", "C", "F"
  string explanation   = 8;     // human-readable rationale

  // ── Domain breakdown ─────────────────────────────────────────────
  repeated DomainTrust per_domain = 9;

  uint64 computed_at_block = 10;
}

// DomainTrust is the per-domain slice of a TrustScore.
message DomainTrust {
  string domain                       = 1;
  uint32 status                       = 2;  // QualificationStatus enum value
  uint32 effective_weight             = 3;  // current weight (penalty-adjusted)
  uint64 accuracy_bps                 = 4;
  uint64 total_verifications          = 5;
  bool   has_active_penalty           = 6;
}

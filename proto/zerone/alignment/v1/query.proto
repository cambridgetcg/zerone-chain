syntax = "proto3";
package zerone.alignment.v1;

option go_package = "github.com/zerone-chain/zerone/x/alignment/types";

import "google/api/annotations.proto";
import "zerone/alignment/v1/types.proto";
import "zerone/alignment/v1/genesis.proto";

// Query defines the alignment module's query service.
service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/params";
  }
  rpc State(QueryStateRequest) returns (QueryStateResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/state";
  }
  rpc Observation(QueryObservationRequest) returns (QueryObservationResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/observations/{height}";
  }
  rpc Scores(QueryScoresRequest) returns (QueryScoresResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/scores/{height}";
  }
  rpc HealthIndex(QueryHealthIndexRequest) returns (QueryHealthIndexResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/health/{height}";
  }
  rpc CorrectionHistory(QueryCorrectionHistoryRequest) returns (QueryCorrectionHistoryResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/corrections";
  }
  rpc HealthHistory(QueryHealthHistoryRequest) returns (QueryHealthHistoryResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/health-history";
  }
  rpc CorrectionConfidence(QueryCorrectionConfidenceRequest) returns (QueryCorrectionConfidenceResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/correction-confidence";
  }
  rpc GlobalPacing(QueryGlobalPacingRequest) returns (QueryGlobalPacingResponse) {
    option (google.api.http).get = "/zerone/alignment/v1/global-pacing";
  }
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1;
}

message QueryStateRequest {}
message QueryStateResponse {
  AlignmentState state = 1;
}

message QueryObservationRequest {
  uint64 height = 1;
}
message QueryObservationResponse {
  AlignmentObservation observation = 1;
  bool found = 2;
}

message QueryScoresRequest {
  uint64 height = 1;
}
message QueryScoresResponse {
  DimensionScores scores = 1;
  bool found = 2;
}

message QueryHealthIndexRequest {
  uint64 height = 1;
}
message QueryHealthIndexResponse {
  AlignmentHealthIndex health_index = 1;
  bool found = 2;
}

message QueryCorrectionHistoryRequest {
  uint32 limit = 1;
  uint32 offset = 2;
}
message QueryCorrectionHistoryResponse {
  repeated CorrectionRecord corrections = 1;
  uint64 total = 2;
}

message QueryHealthHistoryRequest {
  uint32 limit = 1;
}
message QueryHealthHistoryResponse {
  repeated AlignmentHealthIndex entries = 1;
}

message CorrectionOutcome {
  uint64 height = 1;
  string dimension = 2;
  uint64 magnitude = 3;
  string direction = 4;
  uint64 score_before = 5;
  uint64 score_after = 6;
  bool successful = 7;
}

message QueryCorrectionConfidenceRequest {}
message QueryCorrectionConfidenceResponse {
  uint64 confidence_bps = 1;
  uint64 total_corrections = 2;
  uint64 successful_corrections = 3;
  uint64 effective_max_magnitude = 4;
  uint64 effective_observation_interval = 5;
  repeated CorrectionOutcome recent_outcomes = 6;
}

message ModulePacingEffect {
  string module = 1;
  string parameter = 2;
  uint64 base_value = 3;
  uint64 effective_value = 4;
}

message QueryGlobalPacingRequest {}
message QueryGlobalPacingResponse {
  string health_category = 1;
  uint64 creation_multiplier_bps = 2;
  uint64 analysis_multiplier_bps = 3;
  repeated ModulePacingEffect affected_modules = 4;
}
